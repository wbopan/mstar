<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fig 1 — Combined: Phylogenetic Tree + System Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&display=block" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    @font-face {
      font-family: "Libertinus Sans";
      src: url("/Users/panwenbo/Library/Fonts/LibertinusSans-Regular.ttf") format("truetype");
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: "Libertinus Sans";
      src: url("/Users/panwenbo/Library/Fonts/LibertinusSans-Bold.ttf") format("truetype");
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: "Libertinus Sans";
      src: url("/Users/panwenbo/Library/Fonts/LibertinusSans-Italic.ttf") format("truetype");
      font-weight: 400; font-style: italic;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: "Libertinus Sans", "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    // ============================================================
    // COMBINED LAYOUT
    // ============================================================
    const PHYLO_W = 500, PHYLO_H = 500;
    const FIG1_W = 342, FIG1_H = 452;
    const FIG1_SCALE = 0.88;
    const GAP = 6;
    const TOTAL_W = PHYLO_W + GAP + FIG1_W * FIG1_SCALE;
    const TOTAL_H = Math.max(PHYLO_H, FIG1_H * FIG1_SCALE);

    const combinedSvg = d3.select("#chart")
      .append("svg")
      .attr("width", TOTAL_W).attr("height", TOTAL_H)
      .attr("viewBox", `0 0 ${TOTAL_W} ${TOTAL_H}`)
      .style("overflow", "hidden")
      .attr("xmlns", "http://www.w3.org/2000/svg");

    const defs = combinedSvg.append("defs");

    // ============================================================
    // SHARED DEFS
    // ============================================================

    // Drop shadow for program box (from fig1_simple)
    const progShadow = defs.append("filter")
      .attr("id", "prog-shadow")
      .attr("x", "-20%").attr("y", "-20%")
      .attr("width", "160%").attr("height", "160%");
    progShadow.append("feDropShadow")
      .attr("dx", 1).attr("dy", 2)
      .attr("stdDeviation", 2)
      .attr("flood-color", "#000")
      .attr("flood-opacity", 0.12);

    // Arrow markers (from fig1_simple)
    function addArrowMarker(id, color, size=5) {
      defs.append("marker")
        .attr("id", id)
        .attr("viewBox", "0 0 10 10")
        .attr("refX", 9).attr("refY", 5)
        .attr("markerWidth", size).attr("markerHeight", size)
        .attr("orient", "auto-start-reverse")
        .append("path")
        .attr("d", "M 0 1.5 L 10 5 L 0 8.5 z")
        .attr("fill", color);
    }

    // ============================================================
    // LEFT PANEL: PHYLOGENETIC TREE
    // ============================================================
    {
      const phyloOffsetY = (TOTAL_H - PHYLO_H) / 2;
      const gPhylo = combinedSvg.append("g")
        .attr("transform", `translate(0, ${phyloOffsetY})`);

      const W = PHYLO_W, H = PHYLO_H;
      const CX = W/2, CY = H/2;
      const TR = 200;

      // Domain palette
      const DC = [
        { name: "Conversation (LoCoMo)", c: "#1565C0" },
        { name: "Healthcare (HB)",       c: "#D81B60" },
        { name: "Embodied AI (ALFWorld)",c: "#00838F" },
        { name: "Legal (PRBench)",       c: "#6A1B9A" },
      ];

      // Per-domain radial gradients
      DC.forEach((dom, i) => {
        const grad = defs.append("radialGradient").attr("id", `tg-${i}`);
        grad.append("stop").attr("offset", "0%").attr("stop-color", dom.c).attr("stop-opacity", 0.18);
        grad.append("stop").attr("offset", "45%").attr("stop-color", dom.c).attr("stop-opacity", 0.10);
        grad.append("stop").attr("offset", "85%").attr("stop-color", dom.c).attr("stop-opacity", 0.03);
        grad.append("stop").attr("offset", "100%").attr("stop-color", dom.c).attr("stop-opacity", 0);
      });

      // Load tree data
      let PHYLO_DATA = null;
      try {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "phylo_ours.json", false);
        xhr.send();
        if (xhr.status === 200 || xhr.status === 0) PHYLO_DATA = JSON.parse(xhr.responseText);
      } catch(e) { console.warn("Could not load phylo_ours.json:", e); }

      if (PHYLO_DATA) {
        const gTree = gPhylo.append("g").attr("transform", `translate(${CX},${CY})`);

        const root = d3.hierarchy(PHYLO_DATA);

        // Propagate domain index
        root.each(n => {
          if (n.depth <= 1) n.data.d = -1;
          else if (n.depth >= 3) n.data.d = n.parent.data.d;
        });

        // Cluster layout
        d3.cluster()
          .size([2 * Math.PI, TR])
          .separation((a, b) => a.parent === b.parent ? 1 : 2)
          (root);

        // All leaves extend to outermost ring
        root.leaves().forEach(l => { l.y = TR; });

        const px = n => n.y * Math.sin(n.x);
        const py = n => -n.y * Math.cos(n.x);

        // Background sectors
        const sectorArc = d3.arc();
        DC.forEach((dom, i) => {
          const leaves = root.leaves().filter(l => l.data.d === i);
          if (!leaves.length) return;
          const angles = leaves.map(l => l.x);
          gTree.append("path")
            .attr("d", sectorArc({
              innerRadius: 0, outerRadius: TR + 10,
              startAngle: Math.min(...angles) - 0.12,
              endAngle: Math.max(...angles) + 0.12,
            }))
            .attr("fill", `url(#tg-${i})`);
        });

        // Reference rings
        [0.3, 0.55, 0.8].forEach(f => {
          gTree.append("circle").attr("r", TR * f)
            .attr("fill", "none").attr("stroke", "#e8e8e8")
            .attr("stroke-width", 0.4).attr("stroke-dasharray", "3,4");
        });

        // Arcs (connecting siblings at parent radius)
        root.descendants().filter(n => n.children && n.children.length > 1).forEach(node => {
          const r = node.y;
          const childAngles = node.children.map(c => c.x).sort((a, b) => a - b);
          const minA = childAngles[0], maxA = childAngles[childAngles.length - 1];
          if (maxA - minA < 0.001) return;
          const x1 = r * Math.sin(minA), y1 = -r * Math.cos(minA);
          const x2 = r * Math.sin(maxA), y2 = -r * Math.cos(maxA);
          const largeArc = (maxA - minA) > Math.PI ? 1 : 0;
          const di = node.data.d;
          const col = di >= 0 ? DC[di].c : "#b0b0b0";
          gTree.append("path")
            .attr("d", `M ${x1},${y1} A ${r},${r} 0 ${largeArc} 1 ${x2},${y2}`)
            .attr("fill", "none").attr("stroke", col)
            .attr("stroke-width", Math.max(0.8, 2.5 - node.depth * 0.25))
            .attr("stroke-opacity", node.depth <= 1 ? 0.35 : 0.6)
            .attr("stroke-linecap", "round");
        });

        // Radial lines
        root.links().forEach(link => {
          const pR = link.source.y, cR = link.target.y, cA = link.target.x;
          const x1 = pR * Math.sin(cA), y1 = -pR * Math.cos(cA);
          const x2 = cR * Math.sin(cA), y2 = -cR * Math.cos(cA);
          const di = link.target.data.d;
          const col = di >= 0 ? DC[di].c : "#b0b0b0";
          gTree.append("line")
            .attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2)
            .attr("stroke", col)
            .attr("stroke-width", Math.max(0.8, 2.5 - link.target.depth * 0.25))
            .attr("stroke-opacity", link.source.depth <= 1 ? 0.35 : 0.6)
            .attr("stroke-linecap", "round");
        });

        // Internal node dots
        root.descendants().filter(n => n.depth > 1 && n.children).forEach(n => {
          gTree.append("circle")
            .attr("cx", px(n)).attr("cy", py(n)).attr("r", 2.5)
            .attr("fill", DC[n.data.d]?.c || "#999").attr("opacity", 0.5);
        });

        // Leaf dots
        root.leaves().forEach(leaf => {
          const col = DC[leaf.data.d]?.c || "#999";
          gTree.append("circle")
            .attr("cx", px(leaf)).attr("cy", py(leaf)).attr("r", 3)
            .attr("fill", col).attr("stroke", "white").attr("stroke-width", 0.8)
            .attr("opacity", 0.85);
        });

        // Root node
        gTree.append("circle").attr("r", 4).attr("fill", "#333");

        // ================================================================
        // Collision-aware label placement
        // ================================================================

        // 1. Collect all tree line segments for collision detection
        const treeSegs = [];
        // Radial lines
        root.links().forEach(link => {
          const pR = link.source.y, cR = link.target.y, cA = link.target.x;
          treeSegs.push([
            pR * Math.sin(cA), -pR * Math.cos(cA),
            cR * Math.sin(cA), -cR * Math.cos(cA)
          ]);
        });
        // Arc segments (approximated as short line segments)
        root.descendants().filter(n => n.children && n.children.length > 1).forEach(node => {
          const r = node.y;
          const cas = node.children.map(c => c.x).sort((a, b) => a - b);
          const minA = cas[0], maxA = cas[cas.length - 1];
          if (maxA - minA < 0.001) return;
          const N = Math.max(4, Math.ceil((maxA - minA) / 0.02));
          for (let i = 0; i < N; i++) {
            const a1 = minA + (maxA - minA) * i / N;
            const a2 = minA + (maxA - minA) * (i + 1) / N;
            treeSegs.push([
              r * Math.sin(a1), -r * Math.cos(a1),
              r * Math.sin(a2), -r * Math.cos(a2)
            ]);
          }
        });

        // 2. Liang-Barsky segment vs AABB intersection length
        function segAABB(x1, y1, x2, y2, xmin, ymin, xmax, ymax) {
          let t0 = 0, t1 = 1;
          const dx = x2 - x1, dy = y2 - y1;
          const p = [-dx, dx, -dy, dy];
          const q = [x1 - xmin, xmax - x1, y1 - ymin, ymax - y1];
          for (let i = 0; i < 4; i++) {
            if (Math.abs(p[i]) < 1e-10) { if (q[i] < 0) return 0; }
            else {
              const r = q[i] / p[i];
              if (p[i] < 0) { if (r > t0) t0 = r; }
              else           { if (r < t1) t1 = r; }
            }
          }
          if (t0 > t1) return 0;
          const segLen = Math.sqrt(dx * dx + dy * dy);
          return (t1 - t0) * segLen;
        }

        // 3. Measure text width using a hidden SVG element
        const measurer = gTree.append("text")
          .attr("font-size", "6.75px")
          .attr("font-family", '"Libertinus Sans", sans-serif')
          .attr("visibility", "hidden");
        const _measureCache = {};
        function measureW(str) {
          if (_measureCache[str] !== undefined) return _measureCache[str];
          measurer.text(str);
          const w = measurer.node().getComputedTextLength();
          _measureCache[str] = w;
          return w;
        }
        const CH = 7;

        // 4. Place labels: outer-first greedy
        const labelNodes = root.descendants().filter(n => n.data.label && n.depth > 1);
        labelNodes.sort((a, b) => b.y - a.y);

        const placedBoxes = [];

        function scoreFull(la, sr, tw, th) {
          const cr = sr - tw / 2;
          const cx = cr * Math.sin(la), cy = -cr * Math.cos(la);
          let rot = la - Math.PI / 2;
          if (rot > Math.PI / 2) rot -= Math.PI;
          const cosR = Math.cos(-rot), sinR = Math.sin(-rot);
          const hw = tw / 2, hh = th / 2;
          let total = 0;
          for (const s of treeSegs) {
            const dx1 = s[0] - cx, dy1 = s[1] - cy;
            const dx2 = s[2] - cx, dy2 = s[3] - cy;
            total += segAABB(
              dx1 * cosR - dy1 * sinR, dx1 * sinR + dy1 * cosR,
              dx2 * cosR - dy2 * sinR, dx2 * sinR + dy2 * cosR,
              -hw, -hh, hw, hh
            );
          }
          for (const pb of placedBoxes) {
            const pCos = Math.cos(pb.rot), pSin = Math.sin(pb.rot);
            const phw = pb.w / 2, phh = pb.h / 2;
            const corners = [
              [-phw, -phh], [phw, -phh], [phw, phh], [-phw, phh]
            ].map(([lx, ly]) => [
              pb.cx + lx * pCos - ly * pSin,
              pb.cy + lx * pSin + ly * pCos
            ]);
            for (let i = 0; i < 4; i++) {
              const [ex1, ey1] = corners[i];
              const [ex2, ey2] = corners[(i + 1) % 4];
              const dx1 = ex1 - cx, dy1 = ey1 - cy;
              const dx2 = ex2 - cx, dy2 = ey2 - cy;
              total += segAABB(
                dx1 * cosR - dy1 * sinR, dx1 * sinR + dy1 * cosR,
                dx2 * cosR - dy2 * sinR, dx2 * sinR + dy2 * cosR,
                -hw, -hh, hw, hh
              ) * 3;
            }
            const myCornersG = [
              [-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]
            ].map(([lx, ly]) => [
              cx + lx * Math.cos(rot) - ly * Math.sin(rot),
              cy + lx * Math.sin(rot) + ly * Math.cos(rot)
            ]);
            const pbCosN = Math.cos(-pb.rot), pbSinN = Math.sin(-pb.rot);
            for (let i = 0; i < 4; i++) {
              const [ex1, ey1] = myCornersG[i];
              const [ex2, ey2] = myCornersG[(i + 1) % 4];
              const dx1 = ex1 - pb.cx, dy1 = ey1 - pb.cy;
              const dx2 = ex2 - pb.cx, dy2 = ey2 - pb.cy;
              total += segAABB(
                dx1 * pbCosN - dy1 * pbSinN, dx1 * pbSinN + dy1 * pbCosN,
                dx2 * pbCosN - dy2 * pbSinN, dx2 * pbSinN + dy2 * pbCosN,
                -phw, -phh, phw, phh
              ) * 3;
            }
          }
          return total;
        }

        labelNodes.forEach(n => {
          const angle = n.x;
          const col = DC[n.data.d]?.c || "#666";
          const labelText = n.data.label;
          const words = labelText.split(" ");
          const isLeaf = !n.children;
          const canSplit = words.length > 1;

          const pxOpts = isLeaf ? [8, 12, 16, 20] : [4, 8, 12, 16];
          const dirOpts = [1, -1];
          const rShifts = [0, 6, 12, 18, -6];
          const fmts = canSplit ? ["double", "single"] : ["single"];

          let bestScore = Infinity, bestCfg = null, bestTw = 0, bestTh = 0;
          for (const pxVal of pxOpts) {
            for (const dir of dirOpts) {
              for (const rs of rShifts) {
                for (const fmt of fmts) {
                  const nudge = (pxVal / Math.max(n.y, 20)) * dir;
                  const la = angle + nudge;
                  const sr = n.y - 4 + rs;
                  if (sr < 15) continue;
                  let tw, th;
                  if (fmt === "double") {
                    const mid = Math.ceil(words.length / 2);
                    const l1 = words.slice(0, mid).join(" ");
                    const l2 = words.slice(mid).join(" ");
                    tw = Math.max(measureW(l1), measureW(l2));
                    th = 15;
                  } else {
                    tw = measureW(labelText);
                    th = CH;
                  }
                  if (sr - tw < 5) continue;
                  const sc = scoreFull(la, sr, tw, th);
                  if (sc < bestScore) {
                    bestScore = sc; bestCfg = { la, sr, fmt };
                    bestTw = tw; bestTh = th;
                  }
                }
              }
            }
          }

          if (!bestCfg) {
            const fallbackNudge = (16 / Math.max(n.y, 20));
            bestCfg = { la: angle + fallbackNudge, sr: n.y - 4 + 18,
                        fmt: canSplit ? "double" : "single" };
            if (canSplit) {
              const mid = Math.ceil(words.length / 2);
              bestTw = Math.max(measureW(words.slice(0, mid).join(" ")),
                                measureW(words.slice(mid).join(" ")));
              bestTh = 15;
            } else { bestTw = measureW(labelText); bestTh = CH; }
          }

          const { la, sr, fmt } = bestCfg;
          const cr = sr - bestTw / 2;
          let placedRot = la - Math.PI / 2;
          if (placedRot > Math.PI / 2) placedRot -= Math.PI;
          placedBoxes.push({
            cx: cr * Math.sin(la), cy: -cr * Math.cos(la),
            w: bestTw, h: bestTh, rot: placedRot
          });

          const lx = sr * Math.sin(la), ly = -sr * Math.cos(la);
          let rot = la * 180 / Math.PI - 90;
          const flip = rot > 90;
          if (flip) rot -= 180;

          if (fmt === "double") {
            const mid = Math.ceil(words.length / 2);
            const line1 = words.slice(0, mid).join(" ");
            const line2 = words.slice(mid).join(" ");
            const lineH = 7.5;
            const perpX = Math.cos(la), perpY = Math.sin(la);
            const sign = flip ? -1 : 1;
            [line1, line2].forEach((line, li) => {
              const off = (li - 0.5) * lineH * sign;
              gTree.append("text")
                .attr("x", lx + off * perpX).attr("y", ly + off * perpY)
                .attr("text-anchor", flip ? "start" : "end")
                .attr("dominant-baseline", "central")
                .attr("fill", col).attr("font-size", "6.75px")
                .attr("font-family", '"Libertinus Sans", sans-serif')
                .attr("opacity", 0.75)
                .attr("transform", `rotate(${rot},${lx + off * perpX},${ly + off * perpY})`)
                .text(line);
            });
          } else {
            gTree.append("text")
              .attr("x", lx).attr("y", ly)
              .attr("text-anchor", flip ? "start" : "end")
              .attr("dominant-baseline", "central")
              .attr("fill", col).attr("font-size", "6.75px")
              .attr("font-family", '"Libertinus Sans", sans-serif')
              .attr("opacity", 0.75)
              .attr("transform", `rotate(${rot},${lx},${ly})`)
              .text(labelText);
          }
        });

        measurer.remove();

        // Domain labels
        DC.forEach((dom, i) => {
          const leaves = root.leaves().filter(l => l.data.d === i);
          if (!leaves.length) return;
          const midAngle = d3.mean(leaves, l => l.x);
          const lr = TR + 20;
          const lx = lr * Math.sin(midAngle);
          const ly = -lr * Math.cos(midAngle);
          let rot = midAngle * 180 / Math.PI;
          const flip = rot > 90 && rot < 270;
          if (flip) rot += 180;
          gTree.append("text")
            .attr("x", lx).attr("y", ly)
            .attr("text-anchor", "middle")
            .attr("dominant-baseline", flip ? "text-before-edge" : "text-after-edge")
            .attr("fill", dom.c)
            .attr("font-size", "12px").attr("font-weight", "600")
            .attr("font-family", '"Libertinus Sans", sans-serif')
            .attr("transform", `rotate(${rot},${lx},${ly})`)
            .text(dom.name);
        });

        // Outer ring
        gTree.append("circle").attr("r", TR + 5)
          .attr("fill", "none").attr("stroke", "#e0e0e0").attr("stroke-width", 0.5);
      }
    }

    // ============================================================
    // RIGHT PANEL: SYSTEM OVERVIEW (fig1_simple)
    // ============================================================
    {
      const fig1OffsetY = (TOTAL_H - FIG1_H * FIG1_SCALE) / 2 - 12;
      const gFig1 = combinedSvg.append("g")
        .attr("transform", `translate(${PHYLO_W + GAP}, ${fig1OffsetY}) scale(${FIG1_SCALE})`);

      // COLOR PALETTE
      const C = {
        blue:   "#4285F4",
        green:  "#34A853",
        orange: "#FF6D01",
        red:    "#EA4335",
        purple: "#A142F4",
        teal:   "#00897B",
        dark:   "#2D2D2D",
      };

      function blend(hex, amount) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgb(${Math.round(r+(255-r)*amount)},${Math.round(g+(255-g)*amount)},${Math.round(b+(255-b)*amount)})`;
      }
      function alpha(hex, a) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${a})`;
      }

      // LAYOUT
      const MV = 16, MH = 16;
      const VERT_GAP = 20;
      const MID_GAP = 10;
      const HORZ_H = 100, SIDE_W = 150, SIDE_H = 210;
      const HORZ_W = 2 * SIDE_W + MID_GAP;
      const W = 2*MH + HORZ_W;
      const H = 2*MV + 2*HORZ_H + 2*VERT_GAP + SIDE_H;

      const POOL = { x: MH, y: MV, w: HORZ_W, h: HORZ_H };
      const GATE = { x: MH, y: MV + HORZ_H + VERT_GAP, w: SIDE_W, h: SIDE_H };
      const EVAL = { x: MH + SIDE_W + MID_GAP, y: MV + HORZ_H + VERT_GAP, w: SIDE_W, h: SIDE_H };
      const REFL = { x: MH, y: MV + HORZ_H + VERT_GAP + SIDE_H + VERT_GAP, w: HORZ_W, h: HORZ_H };

      // Arrow markers for this panel (prefixed with fig1-)
      function addFig1ArrowMarker(id, color, size=5) {
        defs.append("marker")
          .attr("id", id)
          .attr("viewBox", "0 0 10 10")
          .attr("refX", 9).attr("refY", 5)
          .attr("markerWidth", size).attr("markerHeight", size)
          .attr("orient", "auto-start-reverse")
          .append("path")
          .attr("d", "M 0 1.5 L 10 5 L 0 8.5 z")
          .attr("fill", color);
      }
      addFig1ArrowMarker("fig1-arr-green-sm", blend(C.green, 0.3), 6);
      addFig1ArrowMarker("fig1-arr-orange-sm", blend(C.orange, 0.4), 6);
      addFig1ArrowMarker("fig1-arr-purple-sm", blend(C.purple, 0.4), 6);
      addFig1ArrowMarker("fig1-arr-gray-sm", "#999", 4);
      addFig1ArrowMarker("fig1-arr-red-sm", blend(C.red, 0.4), 5);

      // Clip paths need unique IDs
      // pill1-left -> fig1-pill1-left
      // pill2-left -> fig1-pill2-left
      // refl-header-clip -> fig1-refl-header-clip

      // HELPERS
      function roundedRect(g, x, y, w, h, r, fill, stroke, sw=0.6) {
        return g.append("rect")
          .attr("x", x).attr("y", y).attr("width", w).attr("height", h)
          .attr("rx", r).attr("ry", r)
          .attr("fill", fill).attr("stroke", stroke).attr("stroke-width", sw);
      }

      function label(g, x, y, text, opts={}) {
        return g.append("text")
          .attr("x", x).attr("y", y)
          .attr("fill", opts.color || "#666")
          .attr("font-size", opts.size || "8px")
          .attr("font-weight", opts.weight || "400")
          .attr("font-style", opts.style || "normal")
          .attr("font-family", opts.mono ? '"Source Code Pro", monospace' : '"Libertinus Sans", sans-serif')
          .attr("text-anchor", opts.anchor || "start")
          .attr("dominant-baseline", opts.baseline || "auto")
          .text(text);
      }

      function arrow(g, points, color, marker, sw=0.8, dashed=false) {
        const line = d3.line().x(d=>d[0]).y(d=>d[1]);
        const p = g.append("path")
          .attr("d", line(points))
          .attr("fill", "none")
          .attr("stroke", color)
          .attr("stroke-width", sw)
          .attr("marker-end", `url(#${marker})`);
        if (dashed) p.attr("stroke-dasharray", "3,2");
        return p;
      }

      function stepBadge(g, cx, cy, num, color) {
        g.append("circle").attr("cx", cx).attr("cy", cy).attr("r", 8)
          .attr("fill", color);
        g.append("text")
          .attr("x", cx).attr("y", cy+0.5)
          .attr("text-anchor", "middle").attr("dominant-baseline", "central")
          .attr("fill", "white")
          .attr("font-size", "8.5px").attr("font-weight", "700")
          .text(num);
      }

      function docStack(g, cx, cy, w, h, color) {
        [[3, 3], [1.5, 1.5], [0, 0]].forEach(([dx, dy], i) => {
          const fill = i === 2 ? "white" : blend(color, 0.92 - i*0.03);
          roundedRect(g, cx - w/2 + dx, cy - h/2 + dy, w, h, 2,
            fill, blend(color, 0.4 + i*0.1), 0.4);
        });
        for (let i = 0; i < 3; i++) {
          g.append("line")
            .attr("x1", cx - w/2 + 3).attr("y1", cy - h/2 + 4 + i*4)
            .attr("x2", cx + w/2 - 5 - (i===2?3:0)).attr("y2", cy - h/2 + 4 + i*4)
            .attr("stroke", blend(color, 0.65)).attr("stroke-width", 0.3);
        }
      }

      function lucideIcon(g, x, y, paths, color, size=14) {

        (Array.isArray(paths) ? paths : [paths]).forEach(d => {
          ic.append("path").attr("d", d)
            .attr("fill", "none").attr("stroke", color)
            .attr("stroke-width", 2).attr("stroke-linecap", "round").attr("stroke-linejoin", "round");
        });
        return ic;

      const sqFnPaths = ["M9 17c2 0 2.8-1 2.8-2.8V10c0-2 1-3.3 3.2-3", "M9 11.2h5.7"];

      const panelR = 0, panelSW = 1.2;

      // ============================================================

      label(gEval, bubX + bubW/2, bubY + 14, "Instr.",

      const wrBoxW = 50, wrBoxH = 16;

      drawSqFnIcon(gEval, wrBoxX + wrBoxW/2 - 6, wrBoxY + 1, blend(C.green, 0.35), 12);

      const botG2 = gEval.append("g").attr("transform", `translate(${pill2X + 4},${pill2Y + 3}) scale(${14/24})`);
      ["M12 8V4H8", "M2 14h2", "M20 14h2", "M15 13v2", "M9 13v2"].forEach(d =>

        .attr("x", REFL.x).attr("y", REFL.y).attr("width", REFL.w).attr("height", REFL.h)
        .attr("rx", panelR).attr("fill", blend(C.purple, 0.98))
        .attr("stroke", "#7d6b94").attr("stroke-width", panelSW);

      stepBadge(gRefl, REFL.x + 16, REFL.y + 16, "3", blend(C.purple, 0.15));
      label(gRefl, REFL.x + 30, REFL.y + 20, "Reflect & Mutate",
        {color: blend(C.purple, 0.1), size: "13px", weight: "700"});

      const rColX = REFL.x + REFL.w - 66;
      const rProgW = 22, rProgH = 16;
      const rProgX = rColX, rProgY = REFL.y + 28;
      gRefl.append("rect")
        .attr("x", rProgX).attr("y", rProgY)
        .attr("width", rProgW).attr("height", rProgH).attr("rx", 3)
        .attr("fill", "#fafafa").attr("stroke", "#ccc").attr("stroke-width", 0.7);
      [["#FF5F57", 0], ["#FEBC2E", 5], ["#28C840", 10]].forEach(([c, dx]) => {
        gRefl.append("circle").attr("cx", rProgX + 4 + dx).attr("cy", rProgY + 4.5).attr("r", 1.5)
          .attr("fill", c);
      });
      [[8, "#7c4dff"], [12, "#1976d2"], [6, "#388e3c"]].forEach(([w, c], i) => {
        gRefl.append("rect")
          .attr("x", rProgX + 3).attr("y", rProgY + 8 + i * 2.5)
          .attr("width", w).attr("height", 1.2).attr("rx", 0.5)
          .attr("fill", c).attr("opacity", 0.4);
      });
      label(gRefl, rProgX + rProgW + 4, rProgY + 5, "Current",
        {color: "#555", size: "7px"});
      label(gRefl, rProgX + rProgW + 4, rProgY + 12, "Program",
        {color: "#555", size: "7px"});

      const rListY = REFL.y + 50;
      roundedRect(gRefl, rColX - 4, rListY - 4, 64, 44, 4,
        blend(C.purple, 0.97), blend(C.purple, 0.6), 0.4);
      lucideIcon(gRefl, rColX - 1, rListY - 1,
        ["M22 11.08V12a10 10 0 1 1-5.93-9.14", "M22 4 12 14.01l-3-3"],
        blend(C.green, 0.35), 9);
      label(gRefl, rColX + 12, rListY + 6, "Success cases", {color: "#555", size: "7px"});
      lucideIcon(gRefl, rColX - 1, rListY + 12,
        ["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z", "M15 9l-6 6", "M9 9l6 6"],
        blend(C.red, 0.35), 9);
      label(gRefl, rColX + 12, rListY + 19, "Failed cases", {color: "#555", size: "7px"});
      lucideIcon(gRefl, rColX - 1, rListY + 25,
        ["M6 3v12", "M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", "M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", "M18 9a9 9 0 0 1-9 9"],
        blend(C.blue, 0.35), 9);
      label(gRefl, rColX + 12, rListY + 32, "Lineage log", {color: "#555", size: "7px"});

      const refBoxW = 76, refBoxH = 32;
      const refBoxX = REFL.x + REFL.w/2 - refBoxW/2 - 4;
      const refBoxY = REFL.y + 50;
      const refHeaderH = 14;
      roundedRect(gRefl, refBoxX, refBoxY, refBoxW, refBoxH, 5,
        "white", blend(C.purple, 0.4), 0.7);
      gRefl.append("clipPath").attr("id", "fig1-refl-header-clip")
        .append("rect").attr("x", refBoxX).attr("y", refBoxY)
        .attr("width", refBoxW).attr("height", refHeaderH + 5).attr("rx", 5);
      gRefl.append("rect")
        .attr("x", refBoxX).attr("y", refBoxY)
        .attr("width", refBoxW).attr("height", refHeaderH)
        .attr("fill", blend(C.purple, 0.25))
        .attr("clip-path", "url(#fig1-refl-header-clip)");
      lucideIcon(gRefl, refBoxX + 3, refBoxY + 1,
        ["M12 5a3 3 0 1 0-5.997.142 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z",
         "M9 13a4.38 4.38 0 0 0 2.5 4.035",
         "M15 5.121A4 4 0 0 1 19.794 9",
         "M21,16 a3,3 0 1,0 -6,0 a3,3 0 1,0 6,0",
         "M19.5 13l.5-1", "M21 16h1", "M19.5 19l.5 1",
         "M16.5 19l-.5 1", "M15 16h-1", "M16.5 13l-.5-1"],
        "white", 11);
      label(gRefl, refBoxX + 19, refBoxY + 11, "Reflector",
        {color: "white", size: "9px", weight: "700"});
      label(gRefl, refBoxX + refBoxW/2, refBoxY + refHeaderH + 6, "Diagnose eval errors",
        {color: "#999", size: "6px", anchor: "middle"});
      label(gRefl, refBoxX + refBoxW/2, refBoxY + refHeaderH + 13, "and generate patch",
        {color: "#999", size: "6px", anchor: "middle"});

      const reflMidY = refBoxY + refBoxH/2;
      arrow(gRefl, [[rColX - 4, reflMidY], [refBoxX + refBoxW + 2, reflMidY]],
        blend(C.purple, 0.35), "fig1-arr-purple-sm", 1.0);

      const reflOutX = REFL.x + 10;
      const outStartY = REFL.y + 28;

      roundedRect(gRefl, reflOutX - 4, outStartY - 4, 64, 72, 4,
        blend(C.purple, 0.97), blend(C.purple, 0.6), 0.4);

      const dpX = reflOutX, dpY = outStartY;
      const dpW = 24, dpH = 22;
      gRefl.append("rect").attr("x", dpX).attr("y", dpY)
        .attr("width", dpW).attr("height", dpH).attr("rx", 2)
        .attr("fill", "#fafafa").attr("stroke", "#ccc").attr("stroke-width", 0.5);
      gRefl.append("rect").attr("x", dpX).attr("y", dpY)
        .attr("width", dpW).attr("height", 4).attr("rx", 2).attr("fill", "#e8e8e8");
      gRefl.append("rect").attr("x", dpX).attr("y", dpY + 2)
        .attr("width", dpW).attr("height", 2).attr("fill", "#e8e8e8");
      const diffLines = [
        {c: "#bbb", w: 16, pfx: " "}, {c: "#e53935", w: 14, pfx: "\u2212"},
        {c: "#43a047", w: 12, pfx: "+"}, {c: "#43a047", w: 16, pfx: "+"},
        {c: "#bbb", w: 10, pfx: " "},
      ];
      diffLines.forEach(({c, w, pfx}, i) => {
        const ly = dpY + 6 + i * 3;
        label(gRefl, dpX + 2, ly + 2, pfx, {color: c, size: "4px", mono: true});
        gRefl.append("rect").attr("x", dpX + 6).attr("y", ly)
          .attr("width", w).attr("height", 1.5).attr("rx", 0.5)
          .attr("fill", c).attr("opacity", 0.5);
      });
      label(gRefl, dpX + dpW + 3, dpY + 18, "Diff patch", {color: "#555", size: "7px"});

      const anaY = outStartY + dpH + 10;
      lucideIcon(gRefl, reflOutX + 1, anaY - 1,
        "M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z",
        blend(C.purple, 0.35), 10);
      label(gRefl, reflOutX + 14, anaY + 6, "Analysis", {color: "#555", size: "7px"});

      const logY = anaY + 13;
      lucideIcon(gRefl, reflOutX + 1, logY - 1,
        ["M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z",
         "M14 2v6h6", "M16 13H8", "M16 17H8", "M10 9H8"],
        blend(C.purple, 0.35), 10);
      label(gRefl, reflOutX + 14, logY + 6, "Change log", {color: "#555", size: "7px"});

      arrow(gRefl, [[refBoxX - 1, reflMidY], [reflOutX + dpW + 40, reflMidY]],
        blend(C.purple, 0.35), "fig1-arr-purple-sm", 1.0);

      const progArrowY = rProgY + rProgH/2;
      gRefl.append("path")
        .attr("d", `M${rProgX},${progArrowY} L${dpX + dpW + 2},${progArrowY}`)
        .attr("fill", "none").attr("stroke", blend(C.purple, 0.4))
        .attr("stroke-width", 0.8).attr("stroke-dasharray", "3,2")
        .attr("marker-end", "url(#fig1-arr-purple-sm)");

      // ============================================================
      // LEFT -- QUALITY GATES
      // ============================================================
      const gGate = gFig1.append("g");

      gGate.append("rect")
        .attr("x", GATE.x).attr("y", GATE.y).attr("width", GATE.w).attr("height", GATE.h)
        .attr("rx", panelR).attr("fill", blend(C.red, 0.98))
        .attr("stroke", "#a07070").attr("stroke-width", panelSW);

      stepBadge(gGate, GATE.x + 16, GATE.y + 16, "4", blend(C.red, 0.15));
      label(gGate, GATE.x + 30, GATE.y + 20, "Quality Gates",
        {color: blend(C.red, 0.1), size: "13px", weight: "700"});

      const gateW = 100, gateH = 36;
      const gateGap = 10;
      const gateX = GATE.x + (GATE.w - gateW) / 2;

      const gates = [
        { label: "Compile", color: C.red,
          detail: "Valid syntax & imports",
          iconPaths: ["M16 18a4 4 0 0 0-8 0", "M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z",
                      "M7 9h2", "M15 9h2", "M8 13h8"] },
        { label: "Smoke Test", color: C.orange,
          detail: "write()/read() cycle",
          iconPaths: ["M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z",
                      "M14 2v6h6", "M9 15l2 2 4-4"] },
        { label: "Exec Limits", color: C.teal,
          detail: "Output \u22643000 chars, \u226460s",
          iconPaths: ["M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z", "M12 6v6l4 2"] },
      ];

      const gateBottomY = GATE.y + GATE.h - 54;
      gates.forEach((gate, i) => {
        gate.gy = gateBottomY - (i + 1) * (gateH + gateGap) + gateGap;
      });

      gates.forEach((gate, i) => {
        roundedRect(gGate, gateX, gate.gy, gateW, gateH, 4,
          "white", blend(gate.color, 0.4), 0.6);
        lucideIcon(gGate, gateX + 6, gate.gy + 4, gate.iconPaths,
          blend(gate.color, 0.3), 10);
        label(gGate, gateX + 20, gate.gy + 13, gate.label,
          {color: "#444", size: "8.5px", weight: "600"});
        label(gGate, gateX + 8, gate.gy + 28, gate.detail,
          {color: blend(gate.color, 0.4), size: "6.5px"});
      });

      for (let i = 0; i < gates.length - 1; i++) {
        const fromY = gates[i].gy;
        const toY = gates[i+1].gy + gateH;
        arrow(gGate, [[gateX + gateW/2, fromY - 1], [gateX + gateW/2, toY + 1]],
          blend(C.green, 0.4), "fig1-arr-green-sm", 1.4);
        label(gGate, gateX + gateW/2 + 10, (fromY + toY) / 2 + 2, "pass",
          {color: blend(C.green, 0.3), size: "7.5px"});
      }

      const failX = gateX + gateW + 4;

      gates.forEach((gate) => {
        gGate.append("line")
          .attr("x1", gateX + gateW).attr("y1", gate.gy + gateH/2)
          .attr("x2", failX + 2).attr("y2", gate.gy + gateH/2)
          .attr("stroke", blend(C.red, 0.4)).attr("stroke-width", 1.0);
      });
      gGate.append("line")
        .attr("x1", failX + 2).attr("y1", gates[2].gy + gateH/2)
        .attr("x2", failX + 2).attr("y2", gates[0].gy + gateH/2)
        .attr("stroke", blend(C.red, 0.35)).attr("stroke-width", 1.0);
      label(gGate, failX + 6, gates[1].gy + gateH/2 + 3, "fail",
        {color: blend(C.red, 0.3), size: "7.5px"});

      const fixW = gateW, fixH = 32;
      const fixX = gateX, fixY = GATE.y + GATE.h - fixH - 10;
      roundedRect(gGate, fixX, fixY, fixW, fixH, 4,
        "white", blend(C.orange, 0.4), 0.6);
      lucideIcon(gGate, fixX + 6, fixY + 4,
        "M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z",
        blend(C.orange, 0.3), 10);
      label(gGate, fixX + 20, fixY + 13, "LLM Auto-Fix",
        {color: "#444", size: "8.5px", weight: "600"});
      label(gGate, fixX + 8, fixY + 25, "Repair errors, up to k\u00D73",
        {color: blend(C.orange, 0.4), size: "6.5px"});

      arrow(gGate, [[failX + 2, gates[0].gy + gateH/2], [failX + 2, fixY + fixH/2]],
        blend(C.red, 0.35), "fig1-arr-red-sm", 1.0);
      gGate.append("line")
        .attr("x1", failX + 2).attr("y1", fixY + fixH/2)
        .attr("x2", fixX + fixW).attr("y2", fixY + fixH/2)
        .attr("stroke", blend(C.red, 0.35)).attr("stroke-width", 1.0);

      gGate.append("path")
        .attr("d", `M${fixX},${fixY + fixH/2} C${fixX - 16},${fixY + fixH/2} ${fixX - 16},${gates[0].gy + gateH/2} ${gateX},${gates[0].gy + gateH/2}`)
        .attr("fill", "none").attr("stroke", blend(C.orange, 0.4))
        .attr("stroke-width", 1.0).attr("stroke-dasharray", "3,2")
        .attr("marker-end", "url(#fig1-arr-orange-sm)");

      // ============================================================
      // FLOW ARROWS BETWEEN PANELS
      // ============================================================
      const gFlow = gFig1.append("g");

      // Lucide chevron-down path (pointing down)
      const chevDownPath = "M6 9l6 6 6-6";
      // Lucide chevron-up path (pointing up)
      const chevUpPath = "M18 15l-6-6-6 6";

      // 1→2: POOL → EVAL (chevron-down at EVAL center x)
      {
        const cx = EVAL.x + EVAL.w / 2;
        const midY = POOL.y + POOL.h + VERT_GAP / 2;
        lucideIcon(gFlow, cx - 6, midY - 6, chevDownPath, "#aaa", 12);
        label(gFlow, cx + 10, midY + 4, "Program",
          {color: "#999", size: "8px"});
      }

      // 2→3: EVAL → REFL (chevron-down at EVAL center x)
      {
        const cx = EVAL.x + EVAL.w / 2;
        const midY = EVAL.y + EVAL.h + VERT_GAP / 2;
        lucideIcon(gFlow, cx - 6, midY - 6, chevDownPath, "#aaa", 12);
        label(gFlow, cx + 10, midY + 4, "Results",
          {color: "#999", size: "8px"});
      }

      // 3→4: REFL → GATE (chevron-up at GATE center x)
      {
        const cx = GATE.x + GATE.w / 2;
        const midY = GATE.y + GATE.h + VERT_GAP / 2;
        lucideIcon(gFlow, cx - 6, midY - 6, chevUpPath, "#aaa", 12);
        label(gFlow, cx - 46, midY + 4, "Child P\u2032",
          {color: "#999", size: "8px"});
      }

      // 4→1: GATE → POOL (chevron-up at GATE center x)
      {
        const cx = GATE.x + GATE.w / 2;
        const midY = POOL.y + POOL.h + VERT_GAP / 2;
        lucideIcon(gFlow, cx - 6, midY - 6, chevUpPath, "#aaa", 12);
        label(gFlow, cx - 46, midY + 4, "Validated",
          {color: "#999", size: "8px"});
      }
    }

    // ============================================================
    // DIVIDER: dashed vertical line between left tree and right panels
    // ============================================================
    {
      const divX = PHYLO_W + GAP / 2;
      // Slightly taller than the right panel group
      const fig1Top = (TOTAL_H - FIG1_H * FIG1_SCALE) / 2 - 12;
      const fig1Bot = fig1Top + FIG1_H * FIG1_SCALE;
      const lineTop = fig1Top + 20, lineBot = fig1Bot + 8;
      combinedSvg.append("line")
        .attr("x1", divX).attr("y1", lineTop)
        .attr("x2", divX).attr("y2", lineBot)
        .attr("stroke", "#bbb")
        .attr("stroke-width", 0.8)
        .attr("stroke-dasharray", "4,4");

      // Sub-captions below each panel
      combinedSvg.append("text")
        .attr("x", PHYLO_W / 2).attr("y", TOTAL_H - 4)
        .attr("text-anchor", "middle")
        .attr("fill", "#222").attr("font-size", "14px")
        .attr("font-family", '"Libertinus Sans", sans-serif')
        .text("(a) Evolved memory programs across tasks");

      const fig1CX = PHYLO_W + GAP + (FIG1_W * FIG1_SCALE) / 2;
      combinedSvg.append("text")
        .attr("x", fig1CX).attr("y", TOTAL_H - 4)
        .attr("text-anchor", "middle")
        .attr("fill", "#222").attr("font-size", "14px")
        .attr("font-family", '"Libertinus Sans", sans-serif')
        .text("(b) Evolution loop");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fig 1b — Memory Program Interface + Evolution Loop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Source+Code+Pro:wght@400;500;600&display=block" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    @font-face {
      font-family: "Libertinus Sans";
      src: url("/Users/panwenbo/Library/Fonts/LibertinusSans-Regular.ttf") format("truetype");
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: "Libertinus Sans";
      src: url("/Users/panwenbo/Library/Fonts/LibertinusSans-Bold.ttf") format("truetype");
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: "Libertinus Sans";
      src: url("/Users/panwenbo/Library/Fonts/LibertinusSans-Italic.ttf") format("truetype");
      font-weight: 400; font-style: italic;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: "Libertinus Sans", "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    // ============================================================
    // COMBINED LAYOUT: (a) Memory Program Interface + (b) Evolution Loop
    // ============================================================
    const IFACE_W = 400, IFACE_H = 408;
    // Actual loop content: 2*MV(16) + 2*HORZ_H(100) + 2*VERT_GAP(20) + SIDE_H(210) = 482
    const LOOP_W = 342, LOOP_H = 482;

    const IFACE_SCALE = 0.66 * 0.7; // shrunk 30%, anchored top-right
    const LOOP_SCALE = 0.85;
    // Keep the right edge at the old position (0.66 * IFACE_W)
    const IFACE_RIGHT = IFACE_W * 0.66; // = 264, unchanged for layout
    const GAP = 6;
    const SCALED_IFACE_W = IFACE_W * IFACE_SCALE; // actual width after shrink
    const SCALED_IFACE_H = IFACE_H * IFACE_SCALE;
    const IFACE_OFFSET_X = IFACE_RIGHT - SCALED_IFACE_W; // shift right to anchor top-right
    const SCALED_LOOP_W = LOOP_W * LOOP_SCALE;
    const SCALED_LOOP_H = LOOP_H * LOOP_SCALE;

    const TOTAL_W = IFACE_RIGHT + GAP + SCALED_LOOP_W;
    const IFACE_TOP = 16 * LOOP_SCALE; // match loop's internal MV margin
    const LOOP_VISIBLE_BOTTOM = (LOOP_H - 16) * LOOP_SCALE; // exclude bottom MV padding
    const TOTAL_H = Math.max(IFACE_TOP + SCALED_IFACE_H, LOOP_VISIBLE_BOTTOM);

    const svg = d3.select("#chart")
      .append("svg")
      .attr("width", TOTAL_W).attr("height", TOTAL_H)
      .attr("viewBox", `0 0 ${TOTAL_W} ${TOTAL_H}`)
      .style("overflow", "hidden")
      .attr("xmlns", "http://www.w3.org/2000/svg");

    const defs = svg.append("defs");

    // ============================================================
    // LEFT PANEL (a): Memory Program Interface
    // ============================================================
    {
      // Align top edge with the loop's first box; anchor right edge at IFACE_RIGHT
      const IFACE_TOP_OFFSET = 16 * LOOP_SCALE;
      const gIface = svg.append("g")
        .attr("transform", `translate(${IFACE_OFFSET_X}, ${IFACE_TOP_OFFSET}) scale(${IFACE_SCALE})`);

      const FONT = "Libertinus Sans, sans-serif";
      const MONO = "JetBrains Mono, monospace";

      const C_INSTR  = "#7B1FA2";
      const C_SCHEMA = "#1565C0";
      const C_LOGIC  = "#2E7D32";
      const C_INSTR_BG  = "#F3E5F5";
      const C_SCHEMA_BG = "#E3F2FD";
      const C_LOGIC_BG  = "#E8F5E9";

      const SYN = {
        kw: '#a626a4', str: '#50a14f', comment: '#a0a1a7',
        fn: '#4078f2', cls: '#c18401', op: '#383a42',
        fg: '#383a42', type: '#986801', dec: '#b060c0', ln: '#b0b0b0',
      };

      const W = IFACE_W;
      const ACCENT_W = 1.5;
      const LN_X = 22;
      const CODE_X = 46;
      const LH = 15;
      const SECTION_GAP = 0;
      const HEADER_H = 44;
      const PAD = 4;
      const R = 7;

      const sections = [
        {
          label: "Instructions",
          color: C_INSTR,
          bg: C_INSTR_BG,
          desc: "Prompt constants for the task agent",
          lines: [
            [1, [["INSTRUCTION_KNOWLEDGE_ITEM", C_INSTR], [" = ", SYN.op], ['"..."', SYN.str]]],
            [2, [["INSTRUCTION_QUERY", C_INSTR], [" = ", SYN.op], ['"..."', SYN.str]]],
            [3, [["INSTRUCTION_RESPONSE", C_INSTR], [" = ", SYN.op], ['"..."', SYN.str]]],
            [4, []],
          ],
        },
        {
          label: "Schema",
          color: C_SCHEMA,
          bg: C_SCHEMA_BG,
          desc: "Dataclass definitions for storage and retrieval",
          lines: [
            [5,  [["class", SYN.kw], [" KnowledgeItem", SYN.cls], [":", SYN.op], ["  ", SYN.fg], ["# what to store", SYN.comment]]],
            [6,  [["    topic", SYN.fg], [": ", SYN.op], ["str", SYN.type]]],
            [7,  [["    content", SYN.fg], [": ", SYN.op], ["str", SYN.type]]],
            [8, []],
            [9,  [["class", SYN.kw], [" Query", SYN.cls], [":", SYN.op], ["  ", SYN.fg], ["# how to retrieve", SYN.comment]]],
            [10, [["    question", SYN.fg], [": ", SYN.op], ["str", SYN.type]]],
            [11, [["    category", SYN.fg], [": ", SYN.op], ["str", SYN.type]]],
            [12, []],
          ],
        },
        {
          label: "Logic",
          color: C_LOGIC,
          bg: C_LOGIC_BG,
          desc: "KnowledgeBase class with toolkit access",
          lines: [
            [13, [["class", SYN.kw], [" KnowledgeBase", SYN.cls], [":", SYN.op]]],
            [14, []],
            [15, [["    ", SYN.fg], ["def", SYN.kw], [" write", SYN.fn], ["(self, item: ", SYN.fg], ["KnowledgeItem", SYN.type], ["):", SYN.fg]]],
            [16, [["        self.db.execute(...)", SYN.fg]]],
            [17, []],
            [18, [["    ", SYN.fg], ["def", SYN.kw], [" read", SYN.fn], ["(self, q: ", SYN.fg], ["Query", SYN.type], [") -> ", SYN.op], ["str", SYN.type], [":", SYN.fg]]],
            [19, [["        ", SYN.fg], ["return", SYN.kw], [" self.chroma.query(...)", SYN.fg]]],
            [20, []],
          ],
        },
      ];

      // Compute height
      const LABEL_H = 20;
      let totalH = HEADER_H + PAD;
      sections.forEach((sec, i) => {
        if (i > 0) totalH += SECTION_GAP;
        totalH += LABEL_H + sec.lines.length * LH + 4;
      });
      totalH += PAD;

      // Clip path
      defs.append("clipPath").attr("id", "iface-clip")
        .append("rect").attr("width", W).attr("height", totalH).attr("rx", R);
      const g = gIface.append("g").attr("clip-path", "url(#iface-clip)");

      // White background
      g.append("rect").attr("width", W).attr("height", totalH).attr("fill", "#fff");

      // Header — step badge style matching the right panels
      g.append("rect").attr("width", W).attr("height", HEADER_H + R).attr("fill", "#fcfcfc").attr("rx", R);
      g.append("rect").attr("y", R).attr("width", W).attr("height", HEADER_H - R).attr("fill", "#fcfcfc");
      // (divider line removed for cleaner look)

      // Step badge "0" — compensate for IFACE_SCALE vs LOOP_SCALE
      // Panels 1-4 use 13px at LOOP_SCALE(0.85) → 11.05px global
      // Panel 0 at IFACE_SCALE(0.66) needs 13 * 0.85/0.66 ≈ 16.7px to match
      const scaleComp = LOOP_SCALE / IFACE_SCALE;
      const badgeCX = 10 + 8 * scaleComp, badgeCY = HEADER_H / 2;
      g.append("circle").attr("cx", badgeCX).attr("cy", badgeCY).attr("r", 8 * scaleComp)
        .attr("fill", "#666");
      g.append("text").attr("x", badgeCX).attr("y", badgeCY + 0.5)
        .attr("text-anchor", "middle").attr("dominant-baseline", "central")
        .attr("fill", "white")
        .attr("font-size", `${8.5 * scaleComp}px`).attr("font-weight", "700")
        .text("0");

      // Title
      g.append("text").attr("x", badgeCX + 8 * scaleComp + 4).attr("y", badgeCY + 1)
        .attr("dominant-baseline", "central")
        .attr("font-size", `${13 * scaleComp}px`).attr("font-weight", "700").attr("fill", "#333")
        .attr("font-family", FONT)
        .text("Seed Memory Program");

      // Sections
      let curY = HEADER_H + PAD;
      sections.forEach((sec, si) => {
        if (si > 0) curY += SECTION_GAP;
        const sectionH = LABEL_H + sec.lines.length * LH + 4;

        // Background band (no accent bar)
        g.append("rect").attr("x", 0).attr("y", curY)
          .attr("width", W).attr("height", sectionH)
          .attr("fill", sec.bg).attr("fill-opacity", 0.5);

        // Badge
        const badgeW = sec.label.length * 7.5 + 16;
        g.append("rect").attr("x", 8).attr("y", curY + 3)
          .attr("width", badgeW).attr("height", 16)
          .attr("fill", sec.color).attr("fill-opacity", 0.12);
        g.append("text").attr("x", 8 + badgeW / 2).attr("y", curY + 12)
          .attr("text-anchor", "middle").attr("dominant-baseline", "central")
          .attr("font-size", "10px").attr("font-weight", "700").attr("fill", sec.color).attr("font-family", FONT)
          .text(sec.label);

        // Description
        g.append("text").attr("x", 8 + badgeW + 8).attr("y", curY + 12)
          .attr("dominant-baseline", "central")
          .attr("font-size", "9.5px").attr("fill", "#888").attr("font-family", FONT)
          .text(sec.desc);

        // Code lines
        const codeY = curY + LABEL_H;
        sec.lines.forEach(([lineNum, tokens], li) => {
          const cy = codeY + li * LH + LH * 0.6;
          if (lineNum !== null) {
            g.append("text").attr("x", LN_X).attr("y", cy)
              .attr("text-anchor", "end").attr("dominant-baseline", "central")
              .attr("font-size", "9px").attr("font-family", MONO).attr("fill", SYN.ln)
              .text(lineNum);
          }
          if (!tokens || tokens.length === 0) return;
          const t = g.append("text").attr("x", CODE_X).attr("y", cy)
            .attr("dominant-baseline", "central")
            .attr("font-size", "12px").attr("font-family", MONO).attr("fill", SYN.fg)
            .attr("xml:space", "preserve");
          tokens.forEach(([text, color]) => {
            t.append("tspan").attr("fill", color || SYN.fg).text(text);
          });
        });

        curY += sectionH;
      });

      // Border
      gIface.append("rect").attr("width", W).attr("height", totalH)
        .attr("fill", "none").attr("stroke", "#ccc").attr("stroke-width", 0.7 / IFACE_SCALE).attr("rx", R);
    }

    // ============================================================
    // RIGHT PANEL (b): Evolution Loop
    // ============================================================
    {
      const gLoop = svg.append("g")
        .attr("transform", `translate(${IFACE_RIGHT + GAP}, 0) scale(${LOOP_SCALE})`);

      // COLOR PALETTE
      const C = {
        blue:   "#4285F4",
        green:  "#34A853",
        orange: "#FF6D01",
        red:    "#EA4335",
        purple: "#A142F4",
        teal:   "#00897B",
        dark:   "#2D2D2D",
      };

      function blend(hex, amount) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `rgb(${Math.round(r+(255-r)*amount)},${Math.round(g+(255-g)*amount)},${Math.round(b+(255-b)*amount)})`;
      }

      // LAYOUT
      const MV = 16, MH = 16;
      const VERT_GAP = 20;
      const MID_GAP = 10;
      const HORZ_H = 100, SIDE_W = 150, SIDE_H = 210;
      const HORZ_W = 2 * SIDE_W + MID_GAP;
      const W = 2*MH + HORZ_W;
      const H = 2*MV + 2*HORZ_H + 2*VERT_GAP + SIDE_H;

      const POOL = { x: MH, y: MV, w: HORZ_W, h: HORZ_H };
      const GATE = { x: MH, y: MV + HORZ_H + VERT_GAP, w: SIDE_W, h: SIDE_H };
      const EVAL = { x: MH + SIDE_W + MID_GAP, y: MV + HORZ_H + VERT_GAP, w: SIDE_W, h: SIDE_H };
      const REFL = { x: MH, y: MV + HORZ_H + VERT_GAP + SIDE_H + VERT_GAP, w: HORZ_W, h: HORZ_H };

      // Arrow markers (prefixed)
      function addMarker(id, color, size=5) {
        defs.append("marker")
          .attr("id", id)
          .attr("viewBox", "0 0 10 10")
          .attr("refX", 9).attr("refY", 5)
          .attr("markerWidth", size).attr("markerHeight", size)
          .attr("orient", "auto-start-reverse")
          .append("path")
          .attr("d", "M 0 1.5 L 10 5 L 0 8.5 z")
          .attr("fill", color);
      }
      addMarker("b-arr-green-sm", blend(C.green, 0.3), 6);
      addMarker("b-arr-orange-sm", blend(C.orange, 0.4), 6);
      addMarker("b-arr-purple-sm", blend(C.purple, 0.4), 6);
      addMarker("b-arr-gray-sm", "#999", 4);
      addMarker("b-arr-red-sm", blend(C.red, 0.4), 5);

      // Panel gradients (subtle top-to-bottom: white → tinted)
      function addPanelGrad(id, color) {
        const grad = defs.append("linearGradient").attr("id", id)
          .attr("x1", "0").attr("y1", "0").attr("x2", "0").attr("y2", "1");
        grad.append("stop").attr("offset", "0%").attr("stop-color", "#ffffff");
        grad.append("stop").attr("offset", "100%").attr("stop-color", blend(color, 0.95));
      }
      addPanelGrad("grad-blue", C.blue);
      addPanelGrad("grad-green", C.green);
      addPanelGrad("grad-purple", C.purple);
      addPanelGrad("grad-red", C.red);

      // HELPERS
      function roundedRect(g, x, y, w, h, r, fill, stroke, sw=0.6) {
        return g.append("rect")
          .attr("x", x).attr("y", y).attr("width", w).attr("height", h)
          .attr("rx", r).attr("ry", r)
          .attr("fill", fill).attr("stroke", stroke).attr("stroke-width", sw);
      }

      function label(g, x, y, text, opts={}) {
        return g.append("text")
          .attr("x", x).attr("y", y)
          .attr("fill", opts.color || "#666")
          .attr("font-size", opts.size || "8px")
          .attr("font-weight", opts.weight || "400")
          .attr("font-style", opts.style || "normal")
          .attr("font-family", opts.mono ? '"Source Code Pro", monospace' : '"Libertinus Sans", sans-serif')
          .attr("text-anchor", opts.anchor || "start")
          .attr("dominant-baseline", opts.baseline || "auto")
          .text(text);
      }

      function arrow(g, points, color, marker, sw=0.8, dashed=false) {
        const line = d3.line().x(d=>d[0]).y(d=>d[1]);
        const p = g.append("path")
          .attr("d", line(points))
          .attr("fill", "none")
          .attr("stroke", color)
          .attr("stroke-width", sw)
          .attr("marker-end", `url(#${marker})`);
        if (dashed) p.attr("stroke-dasharray", "3,2");
        return p;
      }

      function stepBadge(g, cx, cy, num, color) {
        g.append("circle").attr("cx", cx).attr("cy", cy).attr("r", 8)
          .attr("fill", color);
        g.append("text")
          .attr("x", cx).attr("y", cy+0.5)
          .attr("text-anchor", "middle").attr("dominant-baseline", "central")
          .attr("fill", "white")
          .attr("font-size", "8.5px").attr("font-weight", "700")
          .text(num);
      }

      function docStack(g, cx, cy, w, h, color) {
        [[3, 3], [1.5, 1.5], [0, 0]].forEach(([dx, dy], i) => {
          const fill = i === 2 ? "white" : blend(color, 0.92 - i*0.03);
          roundedRect(g, cx - w/2 + dx, cy - h/2 + dy, w, h, 2,
            fill, blend(color, 0.4 + i*0.1), 0.4);
        });
        for (let i = 0; i < 3; i++) {
          g.append("line")
            .attr("x1", cx - w/2 + 3).attr("y1", cy - h/2 + 4 + i*4)
            .attr("x2", cx + w/2 - 5 - (i===2?3:0)).attr("y2", cy - h/2 + 4 + i*4)
            .attr("stroke", blend(color, 0.65)).attr("stroke-width", 0.3);
        }
      }

      function lucideIcon(g, x, y, paths, color, size=14) {
        const ic = g.append("g").attr("transform", `translate(${x},${y}) scale(${size/24})`);
        (Array.isArray(paths) ? paths : [paths]).forEach(d => {
          ic.append("path").attr("d", d)
            .attr("fill", "none").attr("stroke", color)
            .attr("stroke-width", 2).attr("stroke-linecap", "round").attr("stroke-linejoin", "round");
        });
        return ic;
      }

      const sqFnPaths = ["M9 17c2 0 2.8-1 2.8-2.8V10c0-2 1-3.3 3.2-3", "M9 11.2h5.7"];
      const sqFnRect = {x:3, y:3, w:18, h:18, rx:2};
      function drawSqFnIcon(g, ix, iy, color, sz=12) {
        const ic = g.append("g").attr("transform", `translate(${ix},${iy}) scale(${sz/24})`);
        ic.append("rect").attr("x", sqFnRect.x).attr("y", sqFnRect.y)
          .attr("width", sqFnRect.w).attr("height", sqFnRect.h).attr("rx", sqFnRect.rx)
          .attr("fill", "none").attr("stroke", color).attr("stroke-width", 2)
          .attr("stroke-linecap", "round").attr("stroke-linejoin", "round");
        sqFnPaths.forEach(d => ic.append("path").attr("d", d)
          .attr("fill", "none").attr("stroke", color).attr("stroke-width", 2)
          .attr("stroke-linecap", "round").attr("stroke-linejoin", "round"));
      }

      const panelR = 4, panelSW = 0.7;

      // ============================================================
      // TOP -- PROGRAM POOL (title moved left, no divider, zoom lines)
      // ============================================================
      const gPool = gLoop.append("g");

      gPool.append("rect")
        .attr("x", POOL.x).attr("y", POOL.y).attr("width", POOL.w).attr("height", POOL.h)
        .attr("rx", panelR).attr("fill", "url(#grad-blue)")
        .attr("stroke", blend(C.blue, 0.6)).attr("stroke-width", panelSW);

      const poolHalfW = POOL.w / 2;
      const LX = POOL.x + 12;

      // Title: "Program Pool" at left (where "Memory Schema" was)
      stepBadge(gPool, LX + 6, POOL.y + 14, "1", blend(C.blue, 0.15));
      label(gPool, LX + 20, POOL.y + 18, "Program Pool",
        {color: blend(C.blue, 0.1), size: "13px", weight: "700"});

      // Left side: mini code editor (kept from Memory Schema)
      const boxY = POOL.y + 25, boxH = 68;
      const boxW = poolHalfW - 16;
      roundedRect(gPool, LX - 4, boxY, boxW, boxH, 5,
        "#fafafa", "#ccc", 0.8);
      const stlX = LX + 3, stlY = boxY + 7;
      [["#FF5F57", 0], ["#FEBC2E", 7], ["#28C840", 14]].forEach(([c, dx]) => {
        gPool.append("circle").attr("cx", stlX + dx).attr("cy", stlY).attr("r", 2.5)
          .attr("fill", c);
      });

      const row1Y = boxY + 15;
      drawSqFnIcon(gPool, LX + 2, row1Y - 1, blend(C.blue, 0.3), 12);
      label(gPool, LX + 18, row1Y + 8, "write()/read()", {color: "#444", size: "10px", mono: true});

      const row2Y = row1Y + 19;
      lucideIcon(gPool, LX + 2, row2Y - 1, "M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z", blend(C.purple, 0.35), 12);
      label(gPool, LX + 18, row2Y + 8, "Instructions", {color: "#444", size: "10px"});

      const row3Y = row2Y + 19;
      lucideIcon(gPool, LX + 2, row3Y - 1, "M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z", blend(C.teal, 0.3), 12);
      label(gPool, LX + 18, row3Y + 8, "Toolkit", {color: "#444", size: "10px"});
      const tkX = LX + 62;
      lucideIcon(gPool, tkX, row3Y, ["M12 2C6.5 2 2 4.5 2 6s4.5 4 10 4 10-2.5 10-4-4.5-4-10-4z", "M2 6v6c0 1.5 4.5 4 10 4s10-2.5 10-4V6", "M2 12v6c0 1.5 4.5 4 10 4s10-2.5 10-4v-6"], blend(C.blue, 0.4), 9);
      lucideIcon(gPool, tkX + 14, row3Y, "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z", blend(C.teal, 0.35), 9);
      lucideIcon(gPool, tkX + 28, row3Y, ["M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z", "M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z", "M12 5v13"], blend(C.purple, 0.4), 9);

      // No divider line

      // Right side: program list
      const RX = POOL.x + poolHalfW + 8;

      const programs = [
        { checks: [1,0,1,1], score: 0.47 },
        { checks: [1,1,0,0], score: 0.32 },
        { checks: [1,1,1,0], score: 0.41 },
        { checks: [0,1,1,1], score: 0.38 },
        { checks: [1,0,0,1], score: 0.26 },
      ];
      const progStartY = POOL.y + 34;
      const progRowH = 12;
      const barMaxW = 30;
      const maxScore = 0.50;

      programs.forEach((prog, i) => {
        const py = progStartY + i * progRowH;
        lucideIcon(gPool, RX, py - 2, ["M3 3h18a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z", "M1 9h22"], blend(C.blue, 0.4), 9);
        prog.checks.forEach((v, j) => {
          label(gPool, RX + 14 + j * 10, py + 6, v ? "\u2713" : "\u00D7",
            {color: v ? blend(C.green, 0.3) : blend(C.red, 0.35), size: "8px", anchor: "middle"});
        });
        label(gPool, RX + 56, py + 6, prog.score.toFixed(2),
          {color: "#666", size: "7.5px", mono: true});

      // ============================================================
      // RIGHT -- EVALUATE

      const gEval = gLoop.append("g");

      gEval.append("rect")

        .attr("rx",4).attr("fill",blend5(C5.purple,0.92)).attr("stroke",blend5(C5.purple,0.6)).attr("stroke-width",0.5);
      gEval5.append("path").attr("d",`M${bub5X},${bub5Y+bub5H/2-3} L${bub5X-3},${bub5Y+bub5H/2} L${bub5X},${bub5Y+bub5H/2+3} Z`)
        .attr("fill",blend5(C5.purple,0.92)).attr("stroke",blend5(C5.purple,0.6)).attr("stroke-width",0.5);
      gEval5.append("line").attr("x1",bub5X).attr("y1",bub5Y+bub5H/2-4).attr("x2",bub5X).attr("y2",bub5Y+bub5H/2+4)
        .attr("stroke",blend5(C5.purple,0.92)).attr("stroke-width",1.5);
      label5(gEval5, bub5X+bub5W/2, bub5Y+7, "Write", {color:blend5(C5.purple,0.15),size:"5.5px",weight:"600",anchor:"middle"});
      label5(gEval5, bub5X+bub5W/2, bub5Y+14, "Instr.", {color:blend5(C5.purple,0.15),size:"5.5px",weight:"600",anchor:"middle"});

      const wrBoxW5=50,wrBoxH5=16;
      const wrBoxX5=E.x+E.w/2-wrBoxW5/2, wrBoxY5=ingestCY5+pillH5/2+8;
      drawSqFnIcon5(gEval5, wrBoxX5+wrBoxW5/2-6, wrBoxY5+1, blend5(C5.green,0.35), 12);
      label5(gEval5, wrBoxX5+wrBoxW5/2+8, wrBoxY5+9, "write()", {color:"#777",size:"7.5px",weight:"600",mono:true});

      arrow5(gEval5, [[pillX5+pillW5/2,pillY5+pillH5+1],[wrBoxX5+wrBoxW5/2,wrBoxY5-1]], blend5(C5.green,0.35), 1.0);
      arrow5(gEval5, [[wrBoxX5+wrBoxW5/2,wrBoxY5+wrBoxH5+1],[kbCX5,kbCY5-cylH5/2-1]], blend5(C5.green,0.35), 1.0);

      // Knowledge graph — teal mono-color, no background
      {
        const TEAL = "#00897B";
        const kgY = kbCY5;
        const kgX = E.x + 8;
        const kgW = E.w - 16;
        const nodeR = 3.5;
        const nodes = [
          { x: kgX + 10,       y: kgY - 6 },
          { x: kgX + 10,       y: kgY + 6 },
          { x: kgX + 30,       y: kgY - 3 },
          { x: kgX + 30,       y: kgY + 7 },
          { x: kgX + 50,       y: kgY },
          { x: kgX + 50,       y: kgY - 9 },
          { x: kgX + 70,       y: kgY - 4 },
          { x: kgX + 70,       y: kgY + 7 },
          { x: kgX + 90,       y: kgY + 2 },
          { x: kgX + 90,       y: kgY - 8 },
          { x: kgX + 110,      y: kgY - 2 },
          { x: kgX + 110,      y: kgY + 8 },
          { x: kgX + kgW - 10, y: kgY },
          { x: kgX + kgW - 10, y: kgY - 8 },
        ];
        const edges = [
          [0,2],[0,3],[1,3],[2,4],[2,5],[3,4],[4,6],[4,7],[5,6],[6,8],[6,9],
          [7,8],[7,11],[8,10],[9,10],[10,12],[10,13],[11,12]
        ];
        edges.forEach(([a,b]) => {
          gEval5.append("line")
            .attr("x1",nodes[a].x).attr("y1",nodes[a].y)
            .attr("x2",nodes[b].x).attr("y2",nodes[b].y)
            .attr("stroke", TEAL).attr("stroke-width", 1.0).attr("opacity", 0.4);
        });
        nodes.forEach(n => {
          gEval5.append("circle").attr("cx", n.x).attr("cy", n.y).attr("r", nodeR)
            .attr("fill", TEAL).attr("stroke", "white").attr("stroke-width", 0.6).attr("opacity", 0.7);
        });

        // Brackets [ ] around the knowledge graph
        const brkY = kgY - 12, brkH = 24;
        // Left bracket [
        const lbX = kgX - 2;
        gEval5.append("path")
          .attr("d", `M${lbX+4},${brkY} L${lbX},${brkY} L${lbX},${brkY+brkH} L${lbX+4},${brkY+brkH}`)
          .attr("fill", "none").attr("stroke", TEAL).attr("stroke-width", 1.2).attr("opacity", 0.6);
        // Right bracket ]
        const rbX = kgX + kgW + 2;
        gEval5.append("path")
          .attr("d", `M${rbX-4},${brkY} L${rbX},${brkY} L${rbX},${brkY+brkH} L${rbX-4},${brkY+brkH}`)
          .attr("fill", "none").attr("stroke", TEAL).attr("stroke-width", 1.2).attr("opacity", 0.6);
      }

      // Lower: read
      const rdBoxW5=50,rdBoxH5=16;
      const rdBoxX5=E.x+E.w/2-rdBoxW5/2, rdBoxY5=kbCY5+cylH5/2+6;
      drawSqFnIcon5(gEval5, rdBoxX5+rdBoxW5/2-6, rdBoxY5+1, blend5(C5.green,0.35), 12);
      label5(gEval5, rdBoxX5+rdBoxW5/2+8, rdBoxY5+9, "read()", {color:"#777",size:"7.5px",weight:"600",mono:true});
      arrow5(gEval5, [[kbCX5,kbCY5+cylH5/2+1],[rdBoxX5+rdBoxW5/2,rdBoxY5-1]], blend5(C5.green,0.35), 1.0);

      const valCY5=rdBoxY5+rdBoxH5+18;
      const pill2X5=E.x+E.w/2-pillW5/2, pill2Y5=valCY5-pillH5/2;
      gEval5.append("rect").attr("x",pill2X5).attr("y",pill2Y5).attr("width",pillW5).attr("height",pillH5)
        .attr("rx",pillR5).attr("fill","white").attr("stroke",blend5(C5.green,0.35)).attr("stroke-width",0.7);
      gEval5.append("clipPath").attr("id","p5-pill2-left")
        .append("rect").attr("x",pill2X5).attr("y",pill2Y5-1).attr("width",pillSplit5).attr("height",pillH5+2);
      gEval5.append("rect").attr("x",pill2X5).attr("y",pill2Y5).attr("width",pillW5).attr("height",pillH5)
        .attr("rx",pillR5).attr("fill",blend5(C5.green,0.3)).attr("clip-path","url(#p5-pill2-left)");
      const botG5b = gEval5.append("g").attr("transform",`translate(${pill2X5+4},${pill2Y5+3}) scale(${14/24})`);
      ["M12 8V4H8","M2 14h2","M20 14h2","M15 13v2","M9 13v2"].forEach(d =>
        botG5b.append("path").attr("d",d).attr("fill","none").attr("stroke","white")
          .attr("stroke-width",2).attr("stroke-linecap","round").attr("stroke-linejoin","round"));
      botG5b.append("rect").attr("x",4).attr("y",8).attr("width",16).attr("height",12).attr("rx",2)
        .attr("fill","none").attr("stroke","white").attr("stroke-width",2).attr("stroke-linecap","round").attr("stroke-linejoin","round");
      label5(gEval5, pill2X5+pillSplit5+3, pill2Y5+13, "Agent", {color:blend5(C5.green,0.1),size:"8px",weight:"700"});

      docStack5(gEval5, E.x+16, valCY5-2, 18, 14, C5.red);
      label5(gEval5, E.x+16, valCY5+16, "Test set", {color:blend5(C5.red,0.2),size:"7.5px",weight:"600",anchor:"middle"});
      arrow5(gEval5, [[E.x+28,valCY5],[pill2X5-2,valCY5]], blend5(C5.green,0.35), 1.0);

      label5(gEval5, pill2X5+pillW5+4, valCY5+4, "+", {color:"#aaa",size:"10px",weight:"600",anchor:"middle"});
      const bub5bX=pill2X5+pillW5+11, bub5bY=pill2Y5+1;
      gEval5.append("rect").attr("x",bub5bX).attr("y",bub5bY).attr("width",bub5W).attr("height",bub5H)
        .attr("rx",4).attr("fill",blend5(C5.purple,0.92)).attr("stroke",blend5(C5.purple,0.6)).attr("stroke-width",0.5);
      gEval5.append("path").attr("d",`M${bub5bX},${bub5bY+bub5H/2-3} L${bub5bX-3},${bub5bY+bub5H/2} L${bub5bX},${bub5bY+bub5H/2+3} Z`)
        .attr("fill",blend5(C5.purple,0.92)).attr("stroke",blend5(C5.purple,0.6)).attr("stroke-width",0.5);
      gEval5.append("line").attr("x1",bub5bX).attr("y1",bub5bY+bub5H/2-4).attr("x2",bub5bX).attr("y2",bub5bY+bub5H/2+4)
        .attr("stroke",blend5(C5.purple,0.92)).attr("stroke-width",1.5);
      label5(gEval5, bub5bX+bub5W/2, bub5bY+7, "Read", {color:blend5(C5.purple,0.15),size:"5.5px",weight:"600",anchor:"middle"});
      label5(gEval5, bub5bX+bub5W/2, bub5bY+14, "Instr.", {color:blend5(C5.purple,0.15),size:"5.5px",weight:"600",anchor:"middle"});

      arrow5(gEval5, [[rdBoxX5+rdBoxW5/2,rdBoxY5+rdBoxH5+1],[pill2X5+pillW5/2,pill2Y5-1]], blend5(C5.green,0.35), 1.0);

      const resultsY5=pill2Y5+pillH5+10;
      arrow5(gEval5, [[pill2X5+pillW5/2,pill2Y5+pillH5+1],[pipeX5,resultsY5-1]], blend5(C5.green,0.35), 1.0);

      // Result text — single line
      label5(gEval5, E.x + E.w/2, resultsY5 + 12, "Improved performance on task",
        {color: blend5(C5.green, 0.15), size: "7px", weight: "700", anchor: "middle"});

      // ---- Zoom lines: minimap Logic → knowledge graph ----
      {
        // Source: a region in the minimap's Logic section (right edge)
        const logicStart = instrLines + schemaLines;
        const zSrcX = mmX + mmW;
        const zSrcTopY = mmY + (logicStart + 8) * lineH;
        const zSrcBotY = mmY + (logicStart + 28) * lineH;

        // Target: knowledge graph brackets in global coords
        // KG in eval5 local: kgY = E.y + E.h*0.48, brackets ±12
        const kgYLocal = EV_OY + EV_OH * 0.48;
        const kgTopLocal = kgYLocal - 12;
        const kgBotLocal = kgYLocal + 12;
        const kgLeftLocal = EV_OX + 6;

        // local → global via gEval5 transform
        const kgTopGlobal = evTargetY + (kgTopLocal - EV_OY) * evFitScale;
        const kgBotGlobal = evTargetY + (kgBotLocal - EV_OY) * evFitScale;
        const kgLeftGlobal = evOffX + (kgLeftLocal - EV_OX) * evFitScale;

        // Dashed beam lines
        svg.append("line")
          .attr("x1", zSrcX).attr("y1", zSrcTopY)
          .attr("x2", kgLeftGlobal).attr("y2", kgTopGlobal)
          .attr("stroke", "#00897B").attr("stroke-width", 0.7)
          .attr("stroke-dasharray", "3,2").attr("opacity", 0.5);
        svg.append("line")
          .attr("x1", zSrcX).attr("y1", zSrcBotY)
          .attr("x2", kgLeftGlobal).attr("y2", kgBotGlobal)
          .attr("stroke", "#00897B").attr("stroke-width", 0.7)
          .attr("stroke-dasharray", "3,2").attr("opacity", 0.5);

        // Semi-transparent fill
        svg.append("path")
          .attr("d", `M${zSrcX},${zSrcTopY} L${kgLeftGlobal},${kgTopGlobal} L${kgLeftGlobal},${kgBotGlobal} L${zSrcX},${zSrcBotY} Z`)
          .attr("fill", "#00897B").attr("opacity", 0.06);
      }
    }
  </script>
</body>
</html>
